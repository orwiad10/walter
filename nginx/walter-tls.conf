# Nginx reverse proxy for the Walter Flask/Waitress application with HTTPS.
#
# This file is a template used by scripts/install_nginx_config.sh --tls-domain.
# The installer replaces __WALTER_DOMAIN__, __WALTER_CERT_DIR__,
# __WALTER_ACME_WEBROOT__, __WALTER_FLASK_IP__, and
# __WALTER_FLASK_PORT__. Do not commit certificate material to this repo.

# Log Cloudflare's original client IP first when present, while retaining the
# proxy address and forwarded chain for audits. This file is included from the
# Nginx http context, where log_format is valid.
server_tokens off;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

log_format walter_real_ip '$http_cf_connecting_ip - $remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for"';

upstream walter_app {
    server __WALTER_FLASK_IP__:__WALTER_FLASK_PORT__;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;

    server_name __WALTER_DOMAIN__;

    # Certbot webroot HTTP-01 challenge directory. Keep this available on port
    # 80 so Let's Encrypt renewals can complete before HTTP traffic is
    # redirected to HTTPS.
    location ^~ /.well-known/acme-challenge/ {
        root __WALTER_ACME_WEBROOT__;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name __WALTER_DOMAIN__;

    client_max_body_size 25m;

    access_log /var/log/nginx/walter.access.log walter_real_ip;
    error_log /var/log/nginx/walter.error.log;

    # Let's Encrypt certificate paths created on the production machine, e.g.:
    #   certbot certonly --webroot -w __WALTER_ACME_WEBROOT__ -d __WALTER_DOMAIN__
    ssl_certificate __WALTER_CERT_DIR__/fullchain.pem;
    ssl_certificate_key __WALTER_CERT_DIR__/privkey.pem;
    ssl_trusted_certificate __WALTER_CERT_DIR__/chain.pem;

    # Permit TLS 1.2 and TLS 1.3 while restricting negotiated cipher suites to
    # FIPS-suitable AES-GCM options. ChaCha20-Poly1305 is intentionally omitted
    # because it is not FIPS-approved. ssl_ciphers applies to TLS 1.2;
    # ssl_conf_command Ciphersuites applies to TLS 1.3.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_conf_command Ciphersuites TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256;
    ssl_prefer_server_ciphers on;

    ssl_session_timeout 1d;
    ssl_session_cache shared:WalterTLS:10m;
    ssl_session_tickets off;

    include snippets/security-headers.conf;

    location = /wp-admin/install.php {
        return 403;
    }

    location = /login {
        limit_req zone=auth_limit burst=10 nodelay;

        proxy_pass http://walter_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /register {
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_pass http://walter_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://walter_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
