# Nginx reverse proxy for the Walter Flask/Waitress application with HTTPS.
#
# This file is a template used by scripts/install_nginx_config.sh --tls-domain.
# The installer replaces __WALTER_DOMAIN__, __WALTER_SERVER_NAMES__,
# __WALTER_CERT_DIR__, __WALTER_ACME_WEBROOT__, __WALTER_FLASK_IP__, and
# __WALTER_FLASK_PORT__. Do not commit certificate material to this repo.

upstream walter_app {
    server __WALTER_FLASK_IP__:__WALTER_FLASK_PORT__;
    keepalive 16;
}

server {
    # Unknown HTTP hostnames should never reach the app. Redirect them to the
    # canonical production hostname instead of reflecting the request Host.
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    location / {
        return 301 https://__WALTER_DOMAIN__$request_uri;
    }
}

server {
    # Reject TLS handshakes for unknown SNI hostnames so the app and default
    # certificate are not exposed through the VPS reverse hostname or IP.
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;

    server_name _;
    ssl_reject_handshake on;
}

server {
    listen 80;
    listen [::]:80;

    server_name __WALTER_SERVER_NAMES__;

    # Certbot webroot HTTP-01 challenge directory. Keep this available on port
    # 80 so Let's Encrypt renewals can complete before HTTP traffic is
    # redirected to HTTPS.
    location ^~ /.well-known/acme-challenge/ {
        root __WALTER_ACME_WEBROOT__;
        default_type "text/plain";
    }

    location / {
        return 301 https://__WALTER_DOMAIN__$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name __WALTER_SERVER_NAMES__;

    client_max_body_size 25m;

    access_log /var/log/nginx/walter.access.log;
    error_log /var/log/nginx/walter.error.log;

    # Let's Encrypt certificate paths created on the production machine, e.g.:
    #   certbot certonly --webroot -w __WALTER_ACME_WEBROOT__ -d __WALTER_DOMAIN__
    ssl_certificate __WALTER_CERT_DIR__/fullchain.pem;
    ssl_certificate_key __WALTER_CERT_DIR__/privkey.pem;
    ssl_trusted_certificate __WALTER_CERT_DIR__/chain.pem;

    # Keep the origin TLS settings compatible with Cloudflare's current origin
    # ClientHello. Cloudflare may prefer X25519 and can offer ChaCha20-Poly1305,
    # so do not restrict the origin to only AES-GCM/FIPS suites.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ecdh_curve X25519:prime256v1:secp384r1;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    ssl_session_timeout 1d;
    ssl_session_cache shared:WalterTLS:10m;
    ssl_session_tickets off;

    location / {
        proxy_pass http://walter_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        limit_except GET POST {
            deny all;
        }

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
